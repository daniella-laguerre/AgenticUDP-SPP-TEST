// SystemPhysics Protocol v1 — structured log messages.
// Maps 1:1 to storage.LogRecord in the Go codebase.

syntax = "proto3";

package spp.v1;

option go_package = "github.com/entropyops/entropyops-v2/pkg/sppv1";

import "google/protobuf/timestamp.proto";

message LogBatch {
  repeated LogRecord logs = 1;
}

message LogRecord {
  google.protobuf.Timestamp timestamp        = 1;
  string                    tenant_id         = 2;
  string                    trace_id          = 3;
  string                    span_id           = 4;
  string                    service_name      = 5;
  string                    severity_text     = 6;
  int32                     severity_number   = 7;
  string                    body              = 8;
  map<string, string>       attributes        = 9;
  map<string, string>       resource_attrs    = 10;
}
